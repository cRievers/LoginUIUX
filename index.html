<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ingressos</title>
    <!-- CSS Base do Material Design -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
</head>
<body>
    <header style="padding: 20px; background-color: var(--primary); color: var(--on-primary); text-align: center;">
        <h1>Sistema de Venda de Ingressos</h1>
    </header>

    <main style="padding: 40px; max-width: 800px; margin: 0 auto; text-align: center;">
        <div class="card">
            <h2>Bem-vindo!</h2>
            <p style="margin-top: 16px; color: var(--secondary);">O sistema está sendo inicializado. Os eventos aparecerão aqui em breve.</p>
            <br>
            <!-- Botões para testar o CSS base do Material -->
            <button class="btn btn-primary" onclick="alert('Funcionalidade em desenvolvimento')">Ver Eventos</button>
            <button class="btn btn-primary" disabled style="margin-left: 8px;">Botão Desabilitado</button>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/data.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
