<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - TicketMaster IFMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--surface-variant);">
    <div class="card fade-in" style="width: 100%; max-width: 400px; padding: 32px;">
        <h1 style="text-align: center; color: var(--primary); margin-bottom: 24px; font-size: 24px;">🎫 TicketMaster</h1>
        <h2 style="text-align: center; margin-bottom: 24px; font-weight: 500;">Recuperar Senha</h2>
        <div id="status-msg" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center;"></div>
        <form id="recuperar-form" onsubmit="event.preventDefault(); doRecuperar();">
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; color: var(--secondary);">E-mail Cadastrado</label>
                <input type="email" id="email" required style="width: 100%; padding: 12px; border: 1px solid var(--outline); border-radius: 8px; font-family: var(--font-main);">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Enviar Instruções</button>
        </form>
        <div style="text-align: center; margin-top: 24px;">
            <a href="/pages/login.html" style="color: var(--primary); text-decoration: none;">&larr; Voltar ao login</a>
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        function doRecuperar() {
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('status-msg');
            const sucesso = recuperarSenha(email);
            
            statusMsg.style.display = 'block';
            if (sucesso) {
                statusMsg.style.backgroundColor = '#E8F5E9';
                statusMsg.style.color = '#2E7D32';
                statusMsg.innerText = 'Instruções enviadas! Verifique seu e-mail.';
            } else {
                statusMsg.style.backgroundColor = '#FFEBEE';
                statusMsg.style.color = '#C62828';
                statusMsg.innerText = 'E-mail não encontrado em nossa base.';
            }
        }
    </script>
</body>
</html>
