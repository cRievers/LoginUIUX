<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TicketMaster IFMG</title>
    <!-- Fonte Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Ícones Material Design -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <!-- CSS Base do Material Design -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        @media (min-width: 768px) {
            .checkout-grid {
                grid-template-columns: 2fr 1fr;
            }
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--outline);
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-container);
        }
        .row {
            display: flex;
            gap: 16px;
        }
        .row > .form-group {
            flex: 1;
        }
        .summary-card {
            position: sticky;
            top: 24px;
            box-shadow: var(--shadow-2);
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--surface-variant);
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 16px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 style="cursor: pointer;" onclick="window.location.href='/'">🎫 TicketMaster IFMG</h1>
            <button class="icon-btn" aria-label="Perfil do Usuário">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
        </div>
    </header>

    <main class="main-container" style="padding-top: 32px;">
        <button id="btn-voltar" class="btn btn-secondary" style="margin-bottom: 24px; background: none; border: 1px solid var(--outline); color: var(--primary);">
            &larr; Voltar para o Evento
        </button>

        <div class="checkout-grid">
            <!-- Coluna 1: Pagamento -->
            <section class="card fade-in">
                <h2 style="display: flex; align-items: center; gap: 8px; color: var(--primary); margin-bottom: 24px;">
                    <span class="material-symbols-outlined">lock</span>
                    Pagamento Seguro
                </h2>

                <form id="payment-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="card-name">Nome Impresso no Cartão</label>
                        <input type="text" id="card-name" class="form-control" placeholder="EX: JOÃO S SILVA" autocomplete="cc-name">
                    </div>

                    <div class="form-group">
                        <label for="card-number">Número do Cartão</label>
                        <input type="text" id="card-number" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="cc-number">
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="card-expiry">Validade (MM/AA)</label>
                            <input type="text" id="card-expiry" class="form-control" placeholder="MM/AA" maxlength="5" autocomplete="cc-exp">
                        </div>
                        <div class="form-group">
                            <label for="card-cvv" style="display: flex; align-items: center; gap: 4px;">
                                CVV
                                <span class="material-symbols-outlined" style="font-size: 16px; cursor: help;" title="Código de 3 ou 4 dígitos no verso do cartão.">help</span>
                            </label>
                            <input type="text" id="card-cvv" class="form-control" placeholder="123" maxlength="4" autocomplete="cc-csc">
                        </div>
                    </div>
                </form>
            </section>

            <!-- Coluna 2: Resumo -->
            <section class="card summary-card fade-in" style="animation-delay: 0.1s;">
                <h3 style="margin-bottom: 16px; color: var(--primary); border-bottom: 2px solid var(--primary-container); padding-bottom: 8px;">Resumo do Pedido</h3>
                
                <div id="summary-content">
                    <p style="text-align: center; color: var(--secondary);">Carregando informações...</p>
                </div>

                <button id="btn-pagar" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem;" disabled>
                    Finalizar Pagamento
                </button>
            </section>
        </div>
    </main>

    <script src="/js/data.js"></script>
    <script src="/js/checkout.js"></script>
</body>
</html>
