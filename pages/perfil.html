<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - TicketMaster IFMG</title>
    <!-- Fonte Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Ícones Material Design -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <!-- CSS Base do Material Design -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 style="cursor: pointer;" onclick="window.location.href='/'">🎫 TicketMaster IFMG</h1>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-weight: 500;">Olá, Usuário</span>
                <button class="icon-btn" aria-label="Sair" onclick="window.location.href='/pages/login.html'">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-container" style="padding-top: 32px;">
        <div id="success-alert" style="display: none; background-color: #E8F5E9; color: #2E7D32; padding: 16px; border-radius: 8px; margin-bottom: 24px; border: 1px solid #A5D6A7; font-weight: 500;">
            <span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 8px;">check_circle</span>
            Compra realizada com sucesso! Seu ingresso já está disponível abaixo.
        </div>

        <button class="btn btn-secondary" onclick="window.location.href='/'" style="margin-bottom: 24px; background: none; border: 1px solid var(--outline); color: var(--primary);">
            &larr; Voltar para Home
        </button>

        <section class="user-profile card fade-in">
            <h2 style="color: var(--primary); margin-bottom: 24px; font-size: 1.5rem; display: flex; align-items: center; gap: 8px;">
                <span class="material-symbols-outlined">local_activity</span>
                Meus Ingressos
            </h2>
            
            <!-- Controles de Navegação (Tabs) - Heurística #7 -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-futuros" onclick="filtrarIngressos('futuros')">Próximos Eventos</button>
                <button class="tab-btn" id="tab-passados" onclick="filtrarIngressos('passados')">Eventos Passados</button>
            </div>

            <!-- Lista de Ingressos -->
            <div id="lista-ingressos" class="tickets-container">
                <!-- Ingressos serão renderizados aqui pelo JS -->
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/perfil.js"></script>
</body>
</html>
