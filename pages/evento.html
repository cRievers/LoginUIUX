<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Evento - TicketMaster IFMG</title>
    <!-- Fonte Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Ícones Material Design -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <!-- CSS Base do Material Design -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 style="cursor: pointer;" onclick="window.location.href='/'">🎫 TicketMaster IFMG</h1>
            <button class="icon-btn" aria-label="Perfil do Usuário">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
        </div>
    </header>

    <main class="main-container" style="padding-top: 32px;">
        <button class="btn btn-secondary" onclick="window.location.href='/'" style="margin-bottom: 24px; background: none; border: 1px solid var(--outline); color: var(--primary);">
            &larr; Voltar
        </button>

        <section class="event-details card fade-in" id="event-details" style="margin-bottom: 32px;">
            <!-- Event Info will be loaded here dynamically -->
        </section>

        <section class="seat-selection card fade-in" style="animation-delay: 0.1s;">
            <h3 style="margin-bottom: 16px; color: var(--primary); text-align: center;">Selecione seu Assento</h3>
            
            <!-- Legenda (Heurística #10) -->
            <div class="legend">
                <div class="legend-item"><span class="seat available" style="pointer-events: none;"></span> Disponível</div>
                <div class="legend-item"><span class="seat occupied" style="pointer-events: none;"></span> Ocupado</div>
                <div class="legend-item"><span class="seat selected" style="pointer-events: none;"></span> Selecionado</div>
            </div>

            <!-- Container do Mapa -->
            <div class="map-wrapper" style="overflow-x: auto; padding-bottom: 16px;">
                <div id="mapa-container" class="map-grid"></div>
            </div>

            <!-- Categoria do Ingresso (Dropdown) -->
            <div style="margin-top: 24px; text-align: center;" id="categoria-selector-container">
                <label for="categoria-ingresso" style="font-weight: 500;">Categoria do Ingresso:</label>
                <select id="categoria-ingresso" class="form-select" style="margin-left: 8px; padding: 8px; border-radius: 8px; border: 1px solid var(--outline); font-family: var(--font-main);">
                    <!-- Categories loaded here -->
                </select>
            </div>

            <!-- Status da Seleção (Heurística #1) -->
            <div id="selection-status" class="card" style="margin-top: 24px; display: none; background-color: var(--surface); border: 1px solid var(--primary-container);">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                    <div>
                        <p style="margin: 0; color: var(--secondary); font-size: 0.875rem;">Resumo da Seleção</p>
                        <p style="margin: 4px 0 0 0; font-size: 1.25rem;">Assento: <strong id="seat-label" style="color: var(--primary);">-</strong></p>
                        <p style="margin: 4px 0 0 0; font-size: 1.1rem;">Preço: <strong id="price-label" style="color: var(--success);">-</strong></p>
                    </div>
                    <button id="btn-confirmar" class="btn btn-primary" disabled>Confirmar Reserva</button>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/evento.js"></script>
</body>
</html>
