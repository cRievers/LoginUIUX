<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TicketMaster IFMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--surface-variant);">
    <div class="card fade-in" style="width: 100%; max-width: 400px; padding: 32px;">
        <h1 style="text-align: center; color: var(--primary); margin-bottom: 24px; font-size: 24px;">🎫 TicketMaster</h1>
        <h2 style="text-align: center; margin-bottom: 24px; font-weight: 500;">Fazer Login</h2>
        <div id="error-msg" style="display: none; color: var(--error); text-align: center; margin-bottom: 16px;"></div>
        <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--secondary);">E-mail</label>
                <input type="email" id="email" required style="width: 100%; padding: 12px; border: 1px solid var(--outline); border-radius: 8px; font-family: var(--font-main);">
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; color: var(--secondary);">Senha</label>
                <input type="password" id="senha" required style="width: 100%; padding: 12px; border: 1px solid var(--outline); border-radius: 8px; font-family: var(--font-main);">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Entrar</button>
        </form>
        <div style="text-align: center; margin-top: 24px; display: flex; flex-direction: column; gap: 8px;">
            <a href="/pages/recuperar-senha.html" style="color: var(--primary); text-decoration: none;">Esqueci minha senha</a>
            <a href="/pages/cadastro.html" style="color: var(--primary); text-decoration: none;">Criar conta</a>
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        function doLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const erroMsg = document.getElementById('error-msg');
            if (login(email, senha)) {
                window.location.href = '/';
            } else {
                erroMsg.innerText = 'E-mail ou senha incorretos.';
                erroMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
